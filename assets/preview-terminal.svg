<svg width="900" height="520" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <defs>
    <linearGradient id="termBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#000300;stop-opacity:1"/>
    </linearGradient>
    <filter id="scanline">
      <feTurbulence type="fractalNoise" baseFrequency="0 0.5" numOctaves="1" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="overlay" result="blended"/>
      <feComposite in="blended" in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="greenGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Pure black terminal background -->
  <rect width="900" height="520" fill="url(#termBg)"/>

  <!-- Scanline overlay texture -->
  <rect width="900" height="520" fill="none" stroke="#00ff41" stroke-width="0" opacity="0.03">
    <animate attributeName="opacity" values="0.02;0.04;0.02" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Terminal window chrome -->
  <rect x="20" y="16" width="860" height="488" rx="6" fill="#000000" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Title bar -->
  <rect x="20" y="16" width="860" height="28" rx="6" fill="#111111"/>
  <rect x="20" y="30" width="860" height="14" fill="#111111"/>
  <!-- Traffic lights -->
  <circle cx="42" cy="30" r="6" fill="#ff5f57"/>
  <circle cx="62" cy="30" r="6" fill="#febc2e"/>
  <circle cx="82" cy="30" r="6" fill="#28c840"/>
  <!-- Title -->
  <text x="450" y="34" font-family="'Courier New', monospace" font-size="11" fill="#888888" text-anchor="middle">sigil — generate</text>

  <!-- ═══════════ LEFT PANEL: Input Terminal ═══════════ -->
  <rect x="30" y="54" width="360" height="440" fill="#000000"/>
  <line x1="390" y1="54" x2="390" y2="494" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Shell prompt and command -->
  <text x="46" y="80" font-family="'Courier New', monospace" font-size="11" fill="#00ff41" filter="url(#greenGlow)">$ sigil generate \</text>
  <text x="46" y="96" font-family="'Courier New', monospace" font-size="11" fill="#00ff41">"staking program with</text>
  <text x="46" y="112" font-family="'Courier New', monospace" font-size="11" fill="#00ff41"> configurable lockup,</text>
  <text x="46" y="128" font-family="'Courier New', monospace" font-size="11" fill="#00ff41"> early withdrawal penalty,</text>
  <text x="46" y="144" font-family="'Courier New', monospace" font-size="11" fill="#00ff41"> authority-controlled</text>
  <text x="46" y="160" font-family="'Courier New', monospace" font-size="11" fill="#00ff41"> emission rate"</text>

  <!-- Agent reasoning output -->
  <text x="46" y="184" font-family="'Courier New', monospace" font-size="10" fill="#00ff4180">──────────────────────</text>

  <text x="46" y="204" font-family="'Courier New', monospace" font-size="10" fill="#444444">› scoring templates...</text>
  <text x="46" y="220" font-family="'Courier New', monospace" font-size="10" fill="#555555">  vault:0.31  token:0.22</text>
  <text x="46" y="236" font-family="'Courier New', monospace" font-size="10" fill="#00ff4160">  staking:<tspan fill="#00ff41" font-weight="bold">0.87</tspan>  ✓</text>

  <text x="46" y="256" font-family="'Courier New', monospace" font-size="10" fill="#444444">› designing accounts...</text>
  <text x="46" y="272" font-family="'Courier New', monospace" font-size="10" fill="#00ff4180">  StakePool    113b</text>
  <text x="46" y="288" font-family="'Courier New', monospace" font-size="10" fill="#00ff4180">  UserStake     89b</text>
  <text x="46" y="304" font-family="'Courier New', monospace" font-size="10" fill="#00ff4180">  EmissionCfg   57b</text>

  <text x="46" y="324" font-family="'Courier New', monospace" font-size="10" fill="#444444">› inferring PDAs...</text>
  <text x="46" y="340" font-family="'Courier New', monospace" font-size="10" fill="#00ff4180">  seeds: [authority, pool_mint]</text>
  <text x="46" y="356" font-family="'Courier New', monospace" font-size="10" fill="#00ff4180">  bump stored in StakePool</text>

  <text x="46" y="376" font-family="'Courier New', monospace" font-size="10" fill="#444444">› building instructions...</text>
  <text x="46" y="392" font-family="'Courier New', monospace" font-size="10" fill="#00ff4180">  initialize_pool  ✓</text>
  <text x="46" y="408" font-family="'Courier New', monospace" font-size="10" fill="#00ff4180">  stake            ✓</text>
  <text x="46" y="424" font-family="'Courier New', monospace" font-size="10" fill="#00ff4180">  unstake          ✓</text>
  <text x="46" y="440" font-family="'Courier New', monospace" font-size="10" fill="#00ff4180">  claim_rewards    ✓</text>

  <text x="46" y="460" font-family="'Courier New', monospace" font-size="10" fill="#444444">› emitting program...</text>
  <!-- Blinking cursor -->
  <rect x="46" y="470" width="8" height="14" fill="#00ff41" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0;0.9" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- ═══════════ RIGHT PANEL: Generated Code ═══════════ -->
  <rect x="390" y="54" width="490" height="440" fill="#000000"/>

  <!-- File tab -->
  <rect x="390" y="54" width="80" height="20" fill="#111111" stroke="#1a1a1a" stroke-width="1"/>
  <text x="430" y="67" font-family="'Courier New', monospace" font-size="9" fill="#00ff4180" text-anchor="middle">lib.rs</text>
  <rect x="470" y="54" width="80" height="20" fill="#000000" stroke="#1a1a1a" stroke-width="1"/>
  <text x="510" y="67" font-family="'Courier New', monospace" font-size="9" fill="#444444" text-anchor="middle">state.rs</text>
  <rect x="550" y="54" width="80" height="20" fill="#000000" stroke="#1a1a1a" stroke-width="1"/>
  <text x="590" y="67" font-family="'Courier New', monospace" font-size="9" fill="#444444" text-anchor="middle">errors.rs</text>

  <!-- Rust code with syntax highlighting -->
  <text x="406" y="92" font-family="'Courier New', monospace" font-size="10" fill="#555555">1</text>
  <text x="424" y="92" font-family="'Courier New', monospace" font-size="10" fill="#f59e0b">use</text>
  <text x="446" y="92" font-family="'Courier New', monospace" font-size="10" fill="#00ff4180"> anchor_lang::prelude::*;</text>

  <text x="406" y="108" font-family="'Courier New', monospace" font-size="10" fill="#555555">2</text>

  <text x="406" y="124" font-family="'Courier New', monospace" font-size="10" fill="#555555">3</text>
  <text x="424" y="124" font-family="'Courier New', monospace" font-size="10" fill="#6366f1">#[program]</text>

  <text x="406" y="140" font-family="'Courier New', monospace" font-size="10" fill="#555555">4</text>
  <text x="424" y="140" font-family="'Courier New', monospace" font-size="10" fill="#f59e0b">pub mod</text>
  <text x="480" y="140" font-family="'Courier New', monospace" font-size="10" fill="#22d3ee"> staking_program </text>
  <text x="618" y="140" font-family="'Courier New', monospace" font-size="10" fill="#00ff41">{</text>

  <text x="406" y="156" font-family="'Courier New', monospace" font-size="10" fill="#555555">5</text>
  <text x="424" y="156" font-family="'Courier New', monospace" font-size="10" fill="#888888">    /// Initialize staking pool with emission config</text>

  <text x="406" y="172" font-family="'Courier New', monospace" font-size="10" fill="#555555">6</text>
  <text x="424" y="172" font-family="'Courier New', monospace" font-size="10" fill="#f59e0b">    pub fn</text>
  <text x="474" y="172" font-family="'Courier New', monospace" font-size="10" fill="#22d3ee"> initialize_pool</text>
  <text x="580" y="172" font-family="'Courier New', monospace" font-size="10" fill="#00ff4180">(ctx: Context&lt;</text>
  <text x="666" y="172" font-family="'Courier New', monospace" font-size="10" fill="#22d3ee">InitializePool</text>
  <text x="764" y="172" font-family="'Courier New', monospace" font-size="10" fill="#00ff4180">&gt;,</text>

  <text x="406" y="188" font-family="'Courier New', monospace" font-size="10" fill="#555555">7</text>
  <text x="424" y="188" font-family="'Courier New', monospace" font-size="10" fill="#00ff4180">        lockup_seconds: </text>
  <text x="562" y="188" font-family="'Courier New', monospace" font-size="10" fill="#f59e0b">u64</text>
  <text x="582" y="188" font-family="'Courier New', monospace" font-size="10" fill="#00ff4180">, emission_rate: </text>
  <text x="700" y="188" font-family="'Courier New', monospace" font-size="10" fill="#f59e0b">u64</text>
  <text x="718" y="188" font-family="'Courier New', monospace" font-size="10" fill="#00ff4180">) -&gt; </text>
  <text x="748" y="188" font-family="'Courier New', monospace" font-size="10" fill="#22c55e">Result</text>
  <text x="793" y="188" font-family="'Courier New', monospace" font-size="10" fill="#00ff4180">&lt;()&gt;</text>

  <text x="406" y="204" font-family="'Courier New', monospace" font-size="10" fill="#555555">8</text>
  <text x="424" y="204" font-family="'Courier New', monospace" font-size="10" fill="#00ff41">{</text>

  <text x="406" y="220" font-family="'Courier New', monospace" font-size="10" fill="#555555">9</text>
  <text x="424" y="220" font-family="'Courier New', monospace" font-size="10" fill="#888888">        // use checked_add for all u64 arithmetic — no silent overflow</text>

  <text x="406" y="236" font-family="'Courier New', monospace" font-size="10" fill="#555555">10</text>
  <text x="424" y="236" font-family="'Courier New', monospace" font-size="10" fill="#00ff4180">        let pool = &amp;</text>
  <text x="528" y="236" font-family="'Courier New', monospace" font-size="10" fill="#f59e0b">mut</text>
  <text x="550" y="236" font-family="'Courier New', monospace" font-size="10" fill="#00ff4180"> ctx.accounts.stake_pool;</text>

  <text x="406" y="252" font-family="'Courier New', monospace" font-size="10" fill="#555555">11</text>
  <text x="424" y="252" font-family="'Courier New', monospace" font-size="10" fill="#00ff4180">        pool.authority = ctx.accounts.authority.</text>
  <text x="700" y="252" font-family="'Courier New', monospace" font-size="10" fill="#22c55e">key()</text>
  <text x="730" y="252" font-family="'Courier New', monospace" font-size="10" fill="#00ff4180">;</text>

  <text x="406" y="268" font-family="'Courier New', monospace" font-size="10" fill="#555555">12</text>
  <text x="424" y="268" font-family="'Courier New', monospace" font-size="10" fill="#00ff4180">        pool.lockup_seconds = lockup_seconds;</text>

  <text x="406" y="284" font-family="'Courier New', monospace" font-size="10" fill="#555555">13</text>
  <text x="424" y="284" font-family="'Courier New', monospace" font-size="10" fill="#00ff4180">        pool.emission_rate = emission_rate;</text>

  <text x="406" y="300" font-family="'Courier New', monospace" font-size="10" fill="#555555">14</text>
  <text x="424" y="300" font-family="'Courier New', monospace" font-size="10" fill="#00ff4180">        pool.bump = </text>
  <text x="516" y="300" font-family="'Courier New', monospace" font-size="10" fill="#888888">*ctx.bumps.get("stake_pool").unwrap();  </text>
  <text x="718" y="300" font-family="'Courier New', monospace" font-size="10" fill="#888888">// canonical</text>

  <text x="406" y="316" font-family="'Courier New', monospace" font-size="10" fill="#555555">15</text>
  <text x="424" y="316" font-family="'Courier New', monospace" font-size="10" fill="#22c55e">        Ok</text>
  <text x="452" y="316" font-family="'Courier New', monospace" font-size="10" fill="#00ff4180">(())</text>

  <text x="406" y="332" font-family="'Courier New', monospace" font-size="10" fill="#555555">16</text>
  <text x="424" y="332" font-family="'Courier New', monospace" font-size="10" fill="#00ff41">    }</text>

  <!-- File tree materializing at bottom -->
  <line x1="400" y1="355" x2="870" y2="355" stroke="#1a1a1a" stroke-width="1"/>
  <text x="406" y="373" font-family="'Courier New', monospace" font-size="10" fill="#22c55e">✓</text>
  <text x="420" y="373" font-family="'Courier New', monospace" font-size="10" fill="#00ff4180"> programs/staking/src/lib.rs</text>
  <text x="406" y="389" font-family="'Courier New', monospace" font-size="10" fill="#22c55e">✓</text>
  <text x="420" y="389" font-family="'Courier New', monospace" font-size="10" fill="#00ff4180"> programs/staking/src/state.rs</text>
  <text x="406" y="405" font-family="'Courier New', monospace" font-size="10" fill="#22c55e">✓</text>
  <text x="420" y="405" font-family="'Courier New', monospace" font-size="10" fill="#00ff4180"> programs/staking/src/errors.rs</text>
  <text x="406" y="421" font-family="'Courier New', monospace" font-size="10" fill="#22c55e">✓</text>
  <text x="420" y="421" font-family="'Courier New', monospace" font-size="10" fill="#00ff4180"> target/idl/staking_program.json</text>
  <text x="406" y="437" font-family="'Courier New', monospace" font-size="10" fill="#22c55e">✓</text>
  <text x="420" y="437" font-family="'Courier New', monospace" font-size="10" fill="#00ff4180"> Anchor.toml  Cargo.toml</text>

  <!-- Status bar -->
  <rect x="30" y="466" width="840" height="22" fill="#0a1a0a"/>
  <text x="406" y="481" font-family="'Courier New', monospace" font-size="9" fill="#00ff41">[SIGIL v1.0]</text>
  <text x="498" y="481" font-family="'Courier New', monospace" font-size="9" fill="#888888">template: staking</text>
  <text x="618" y="481" font-family="'Courier New', monospace" font-size="9" fill="#888888">accounts: 3</text>
  <text x="700" y="481" font-family="'Courier New', monospace" font-size="9" fill="#888888">instructions: 4</text>
  <!-- Progress bar -->
  <rect x="790" y="472" width="72" height="10" rx="2" fill="#111111"/>
  <rect x="790" y="472" width="72" height="10" rx="2" fill="#00ff41" opacity="0.8"/>
  <text x="826" y="481" font-family="'Courier New', monospace" font-size="8" fill="#000000" text-anchor="middle">DONE</text>
</svg>

<svg viewBox="0 0 820 520" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', 'Fira Code', monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0f14"/>
      <stop offset="100%" stop-color="#090b0f"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Window -->
  <rect width="820" height="520" rx="12" fill="url(#bg)"/>
  <rect width="820" height="520" rx="12" fill="none" stroke="#2a2d3a" stroke-width="1"/>

  <!-- Title bar -->
  <rect width="820" height="42" rx="12" fill="#13151d"/>
  <rect y="30" width="820" height="12" fill="#13151d"/>
  <circle cx="20" cy="21" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="21" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="21" r="6" fill="#28c840"/>

  <!-- Header badge -->
  <rect x="310" y="8" width="200" height="26" rx="5" fill="url(#headerGrad)" opacity="0.9"/>
  <text x="410" y="25" text-anchor="middle" fill="white" font-size="11" font-weight="bold" letter-spacing="2">SIGIL · ANCHOR FORGE</text>

  <!-- Prompt line -->
  <text x="24" y="78" fill="#7c3aed" font-size="13" font-weight="bold" filter="url(#glow)">$</text>
  <text x="38" y="78" fill="#e2e8f0" font-size="13">sigil generate</text>
  <text x="165" y="78" fill="#fbbf24" font-size="13" font-style="italic">"Create a token staking program with 7-day lockup and 15% APY"</text>

  <!-- Divider -->
  <line x1="24" y1="92" x2="796" y2="92" stroke="#1e2130" stroke-width="1"/>

  <!-- Agent step 1 -->
  <rect x="24" y="104" width="6" height="14" rx="2" fill="#7c3aed"/>
  <text x="38" y="116" fill="#a78bfa" font-size="12" font-weight="bold">Selecting template</text>
  <text x="38" y="132" fill="#64748b" font-size="11">→ matched: staking  (score 0.94)</text>

  <!-- Agent step 2 -->
  <rect x="24" y="148" width="6" height="14" rx="2" fill="#4f46e5"/>
  <text x="38" y="160" fill="#818cf8" font-size="12" font-weight="bold">Designing accounts</text>
  <text x="38" y="176" fill="#64748b" font-size="11">→ StakePool  · StakeEntry  · RewardVault</text>

  <!-- Agent step 3 -->
  <rect x="24" y="192" width="6" height="14" rx="2" fill="#0ea5e9"/>
  <text x="38" y="204" fill="#38bdf8" font-size="12" font-weight="bold">Designing instructions</text>
  <text x="38" y="220" fill="#64748b" font-size="11">→ initialize_pool  · stake  · unstake  · claim_rewards  · update_config</text>

  <!-- Agent step 4 -->
  <rect x="24" y="236" width="6" height="14" rx="2" fill="#10b981"/>
  <text x="38" y="248" fill="#34d399" font-size="12" font-weight="bold">Emitting program</text>
  <text x="38" y="264" fill="#64748b" font-size="11">→ generating Rust structs  ·  instruction handlers  ·  error codes  ·  IDL</text>

  <!-- Divider -->
  <line x1="24" y1="280" x2="796" y2="280" stroke="#1e2130" stroke-width="1"/>

  <!-- Output file tree -->
  <text x="24" y="300" fill="#94a3b8" font-size="11" font-weight="bold" letter-spacing="1">OUTPUT</text>

  <text x="24" y="320" fill="#4ade80" font-size="12">✓</text>
  <text x="42" y="320" fill="#e2e8f0" font-size="12">programs/staking/src/</text>
  <text x="42" y="336" fill="#64748b" font-size="11">  ├── lib.rs             <tspan fill="#4ade80">generated</tspan></text>
  <text x="42" y="352" fill="#64748b" font-size="11">  ├── state.rs           <tspan fill="#4ade80">generated</tspan></text>
  <text x="42" y="368" fill="#64748b" font-size="11">  ├── instructions/      <tspan fill="#4ade80">5 files</tspan></text>
  <text x="42" y="384" fill="#64748b" font-size="11">  └── errors.rs          <tspan fill="#4ade80">generated</tspan></text>

  <text x="24" y="404" fill="#4ade80" font-size="12">✓</text>
  <text x="42" y="404" fill="#e2e8f0" font-size="12">Anchor.toml  ·  Cargo.toml  ·  idl/staking.json</text>

  <!-- Divider -->
  <line x1="24" y1="418" x2="796" y2="418" stroke="#1e2130" stroke-width="1"/>

  <!-- Stats row -->
  <text x="24" y="438" fill="#64748b" font-size="11">Lines generated</text>
  <text x="24" y="454" fill="#a78bfa" font-size="18" font-weight="bold">847</text>

  <text x="180" y="438" fill="#64748b" font-size="11">Instructions</text>
  <text x="180" y="454" fill="#818cf8" font-size="18" font-weight="bold">5</text>

  <text x="300" y="438" fill="#64748b" font-size="11">Accounts</text>
  <text x="300" y="454" fill="#38bdf8" font-size="18" font-weight="bold">3</text>

  <text x="420" y="438" fill="#64748b" font-size="11">Template</text>
  <text x="420" y="454" fill="#34d399" font-size="18" font-weight="bold">staking</text>

  <text x="580" y="438" fill="#64748b" font-size="11">Time</text>
  <text x="580" y="454" fill="#e2e8f0" font-size="18" font-weight="bold">4.2s</text>

  <!-- Bottom bar -->
  <rect x="0" y="480" width="820" height="40" rx="0" fill="#0d0f14"/>
  <rect x="0" y="480" width="820" height="1" fill="#1e2130"/>
  <text x="24" y="505" fill="#7c3aed" font-size="10" font-weight="bold">SIGIL</text>
  <text x="70" y="505" fill="#475569" font-size="10">AI-powered Anchor program generator</text>
  <text x="620" y="505" fill="#475569" font-size="10">claude-opus-4-6  ·  Anchor 0.31</text>
</svg>


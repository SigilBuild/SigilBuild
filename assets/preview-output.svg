  <text x="292" y="194" fill="#38bdf8" font-size="11">pub mod</text>
  <text x="340" y="194" fill="#e2e8f0" font-size="11"> staking {</text>

  <text x="268" y="210" fill="#475569" font-size="11">8</text>
  <text x="292" y="210" fill="#64748b" font-size="11">    use super::*;</text>

  <text x="268" y="226" fill="#475569" font-size="11">9</text>

  <text x="268" y="242" fill="#475569" font-size="11">10</text>
  <text x="292" y="242" fill="#94a3b8" font-size="11">    /// Initialize staking pool with 15% APY and 7-day lockup</text>

  <rect x="256" y="248" width="556" height="18" rx="2" fill="#1a1c27"/>
  <text x="268" y="260" fill="#475569" font-size="11">11</text>
  <text x="292" y="260" fill="#38bdf8" font-size="11">    pub fn</text>
  <text x="334" y="260" fill="#4ade80" font-size="11"> initialize_pool</text>
  <text x="434" y="260" fill="#e2e8f0" font-size="11">(ctx: Context&lt;InitializePool&gt;, apy_bps: u64) -&gt; Result&lt;()&gt; {</text>

  <text x="268" y="276" fill="#475569" font-size="11">12</text>
  <text x="292" y="276" fill="#64748b" font-size="11">        let pool = &amp;mut ctx.accounts.pool;</text>

  <text x="268" y="292" fill="#475569" font-size="11">13</text>
  <text x="292" y="292" fill="#64748b" font-size="11">        pool.authority = ctx.accounts.authority.key();</text>

  <text x="268" y="308" fill="#475569" font-size="11">14</text>
  <text x="292" y="308" fill="#64748b" font-size="11">        pool.apy_bps = apy_bps;  </text>
  <text x="460" y="308" fill="#475569" font-size="11">// 1500 = 15%</text>

  <text x="268" y="324" fill="#475569" font-size="11">15</text>
  <text x="292" y="324" fill="#64748b" font-size="11">        pool.lockup_seconds = </text>
  <text x="440" y="324" fill="#fbbf24" font-size="11">7</text>
  <text x="450" y="324" fill="#64748b" font-size="11"> * 24 * 60 * 60;</text>

  <text x="268" y="340" fill="#475569" font-size="11">16</text>
  <text x="292" y="340" fill="#64748b" font-size="11">        pool.total_staked = 0;</text>

  <text x="268" y="356" fill="#475569" font-size="11">17</text>
  <text x="292" y="356" fill="#38bdf8" font-size="11">        Ok</text>
  <text x="316" y="356" fill="#e2e8f0" font-size="11">(())</text>

  <text x="268" y="372" fill="#475569" font-size="11">18</text>
  <text x="292" y="372" fill="#e2e8f0" font-size="11">    }</text>

